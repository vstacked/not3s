name: not3s
description: "not3s - A Flutter note-taking app with BLoC and Clean Architecture."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # BLoC state management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0

  # Equality / value objects
  equatable: ^2.0.8

  # Dependency injection
  get_it: ^9.2.0

  # Functional error handling (Either)
  dartz: ^0.10.1

  # HTTP client
  dio: ^5.9.1

  # Secure local storage (token persistence)
  flutter_secure_storage: ^9.0.0

  # Google Fonts (Space Grotesk + Inter)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
